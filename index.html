<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Playing Cards</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&display=swap');
    </style>
</head>
<body>
    <section>
        <h1 class="jmb">Playing Cards</h1>
    </section>
    <main class="card-container">
    <div class="card-1 cds">
        <div class="left">A♠</div>
        <div class="middle">
            <span>♠</span>
            <span>Ace</span>
            <span class="rotate">♠</span>
        </div>
        <div class="right">A♠</div>
    </div>
    <div class="card-2 cds">
        <div class="left">K♥</div>
        <div class="middle">
            <span>♥</span>
            <span>King</span>
            <span class="rotate">♥</span>
        </div>
        <div class="right">K♥</div>
    </div>
    <div class="card-3 cds">
        <div class="left">Q♠</div>
        <div class="middle">
            <span>♠</span>
            <span>Queen</span>
            <span class="rotate">♠</span>
        </div>
        <div class="right">Q♠</div>
    </div>
    <div class="card-4 cds">
        <div class="left">J♦</div>
        <div class="middle">
            <span>♦</span>
            <span>Jack</span>
            <span>♦</span>
        </div>
        <div class="right">J♦</div>
    </div>
    <div class="card-5 cds">
        
        <div class="left">10♠</div>
        <div class="middle">
            <span>♠</span>
            <span>10</span>
            <span class="rotate">♠</span>
        </div>
        <div class="right">10♠</div>

        
    </div>
    
    </main>
    <br>
    <br>

</body>
</html>
